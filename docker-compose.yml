services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./dbs:/app/dbs
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      DBS_ROOT: /app/dbs
    depends_on:
      otel-collector:
        condition: service_started
      jaeger:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC (for local dev outside Docker)
      - "8889:8889"   # Prometheus metrics scrape endpoint
    depends_on:
      jaeger:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:latest
    volumes:
      - ./infra/jaeger-ui-config.json:/etc/jaeger/ui-config.json
    command: ["--query.ui-config=/etc/jaeger/ui-config.json"]
    ports:
      - "16686:16686"   # Jaeger UI
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      METRICS_STORAGE_TYPE: prometheus
      PROMETHEUS_SERVER_URL: http://prometheus:9090
      PROMETHEUS_QUERY_NORMALIZE_CALLS: "true"
      PROMETHEUS_QUERY_NORMALIZE_DURATION: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"   # Prometheus UI
    depends_on:
      - otel-collector
